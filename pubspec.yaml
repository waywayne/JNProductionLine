name: jn_production_line
description: A Flutter production line test application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^6.1.1
  provider: ^6.1.1
  flutter_libserialport: ^0.4.0
  flutter_bluetooth_serial: ^0.4.0  # Android support
  flutter_bluetooth_classic_serial: ^1.3.1  # Windows support
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  intl: ^0.18.1
  http: ^1.1.0
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # 包含 Python 脚本文件和 wheel 包
  assets:
    - scripts/bluetooth_spp_test.py
    - scripts/setup_bluetooth.py
    - scripts/rfcomm_socket.py
    - PyBluez-0.23-cp37-cp37m-win_amd64.whl
