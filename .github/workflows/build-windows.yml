name: Build Windows Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Visual Studio environment
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup build environment
      id: setup-env
      shell: pwsh
      run: |
        Write-Host "Setting up build environment..."
        
        # Find Visual Studio installation
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (!(Test-Path $vsWhere)) {
          Write-Host "ERROR: vswhere.exe not found!"
          exit 1
        }
        
        $vsPath = & $vsWhere -latest -property installationPath
        $vsVersion = & $vsWhere -latest -property installationVersion
        $vsDisplayName = & $vsWhere -latest -property displayName
        
        Write-Host "Found: $vsDisplayName"
        Write-Host "Path: $vsPath"
        Write-Host "Version: $vsVersion"
        
        # Setup Visual Studio environment variables
        $vcvarsPath = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
        if (!(Test-Path $vcvarsPath)) {
          Write-Host "ERROR: vcvars64.bat not found at $vcvarsPath"
          exit 1
        }
        
        Write-Host "✓ Visual Studio environment ready"
        echo "VS_PATH=$vsPath" >> $env:GITHUB_OUTPUT
        echo "VCVARS_PATH=$vcvarsPath" >> $env:GITHUB_OUTPUT
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyvisa pyvisa-py pandas openpyxl
    
    - name: Flutter doctor
      run: flutter doctor -v
    
    - name: Get Flutter dependencies
      run: flutter pub get
    
    - name: Build Windows application
      continue-on-error: true
      id: flutter-build
      shell: cmd
      run: |
        echo ========================================
        echo Setting up Visual Studio environment
        echo ========================================
        call "${{ steps.setup-env.outputs.VCVARS_PATH }}"
        
        echo.
        echo ========================================
        echo Attempting Flutter build (expected to fail)
        echo ========================================
        flutter build windows --release
    
    - name: Check if CMake configuration failed
      shell: pwsh
      run: |
        if ("${{ steps.flutter-build.outcome }}" -eq "failure") {
          Write-Host "Flutter build failed as expected (VS 2019 not found)"
          
          # Check if ephemeral files were generated
          if (!(Test-Path "windows\flutter\ephemeral\generated_config.cmake")) {
            Write-Host "ERROR: Ephemeral files were not generated"
            exit 1
          }
          
          Write-Host "✓ Ephemeral files generated, proceeding with Ninja rebuild"
        } else {
          Write-Host "✓ Flutter build succeeded (unexpected but good!)"
          exit 0
        }
    
    - name: Rebuild with Ninja
      if: steps.flutter-build.outcome == 'failure'
      shell: cmd
      run: |
        echo ========================================
        echo Setting up Visual Studio environment
        echo ========================================
        call "${{ steps.setup-env.outputs.VCVARS_PATH }}"
        
        echo.
        echo ========================================
        echo Cleaning CMake cache
        echo ========================================
        if exist "build\windows\x64\CMakeCache.txt" del /F /Q "build\windows\x64\CMakeCache.txt"
        if exist "build\windows\x64\CMakeFiles" rd /S /Q "build\windows\x64\CMakeFiles"
        
        echo.
        echo ========================================
        echo Reconfiguring with Ninja
        echo ========================================
        cmake -S windows -B build\windows\x64 ^
          -G Ninja ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DFLUTTER_TARGET_PLATFORM=windows-x64
        
        if %ERRORLEVEL% NEQ 0 (
          echo ERROR: CMake reconfiguration failed!
          exit /b 1
        )
        
        echo.
        echo ========================================
        echo Building with Ninja
        echo ========================================
        cmake --build build\windows\x64 --config Release
        
        if %ERRORLEVEL% NEQ 0 (
          echo ERROR: Build failed!
          exit /b 1
        )
        
        echo.
        echo ✓ Build completed successfully!
    
    - name: Get version from pubspec
      id: version
      shell: pwsh
      run: |
        $version = (Get-Content pubspec.yaml | Select-String -Pattern 'version:\s*(.+)').Matches.Groups[1].Value
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Package application
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
        $zipName = "jn_production_line_windows_v${version}_${timestamp}.zip"
        
        # 创建打包目录
        New-Item -ItemType Directory -Force -Path package
        
        # 复制必要文件
        Copy-Item -Path "build/windows/x64/runner/Release/*" -Destination "package/" -Recurse
        Copy-Item -Path "README*.md" -Destination "package/" -ErrorAction SilentlyContinue
        Copy-Item -Path "GPIB*.md" -Destination "package/" -ErrorAction SilentlyContinue
        Copy-Item -Path "install_gpib_dependencies.bat" -Destination "package/" -ErrorAction SilentlyContinue
        
        # 创建 ZIP
        Compress-Archive -Path "package/*" -DestinationPath $zipName
        
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        echo "Created: $zipName"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: jn_production_line_windows_*.zip
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: jn_production_line_windows_*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
