name: Build Windows Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Visual Studio environment
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup build environment
      id: setup-env
      shell: pwsh
      run: |
        Write-Host "Setting up build environment..."
        
        # Find Visual Studio installation
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (!(Test-Path $vsWhere)) {
          Write-Host "ERROR: vswhere.exe not found!"
          exit 1
        }
        
        $vsPath = & $vsWhere -latest -property installationPath
        $vsVersion = & $vsWhere -latest -property installationVersion
        $vsDisplayName = & $vsWhere -latest -property displayName
        
        Write-Host "Found: $vsDisplayName"
        Write-Host "Path: $vsPath"
        Write-Host "Version: $vsVersion"
        
        # Setup Visual Studio environment variables
        $vcvarsPath = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
        if (!(Test-Path $vcvarsPath)) {
          Write-Host "ERROR: vcvars64.bat not found at $vcvarsPath"
          exit 1
        }
        
        Write-Host "✓ Visual Studio environment ready"
        echo "VS_PATH=$vsPath" >> $env:GITHUB_OUTPUT
        echo "VCVARS_PATH=$vcvarsPath" >> $env:GITHUB_OUTPUT
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyvisa pyvisa-py pandas openpyxl
    
    - name: Flutter doctor
      run: flutter doctor -v
    
    - name: Get Flutter dependencies
      run: flutter pub get
    
    - name: Build Windows application
      continue-on-error: true
      id: flutter-build
      shell: cmd
      run: |
        echo ========================================
        echo Setting up Visual Studio environment
        echo ========================================
        call "${{ steps.setup-env.outputs.VCVARS_PATH }}"
        
        echo.
        echo ========================================
        echo Attempting Flutter build (expected to fail)
        echo ========================================
        flutter build windows --release
    
    - name: Check if CMake configuration failed
      shell: pwsh
      run: |
        if ("${{ steps.flutter-build.outcome }}" -eq "failure") {
          Write-Host "Flutter build failed as expected (VS 2019 not found)"
          
          # Check if ephemeral files were generated
          if (!(Test-Path "windows\flutter\ephemeral\generated_config.cmake")) {
            Write-Host "ERROR: Ephemeral files were not generated"
            exit 1
          }
          
          Write-Host "✓ Ephemeral files generated, proceeding with Ninja rebuild"
        } else {
          Write-Host "✓ Flutter build succeeded (unexpected but good!)"
          exit 0
        }
    
    - name: Copy Flutter engine files
      if: steps.flutter-build.outcome == 'failure'
      shell: pwsh
      run: |
        Write-Host "Copying Flutter engine files to ephemeral directory..."
        
        $flutterRoot = $env:FLUTTER_ROOT
        $enginePath = "$flutterRoot\bin\cache\artifacts\engine\windows-x64-release"
        $ephemeralPath = "windows\flutter\ephemeral"
        
        # Ensure ephemeral directory exists
        if (!(Test-Path $ephemeralPath)) {
          New-Item -ItemType Directory -Path $ephemeralPath -Force | Out-Null
        }
        
        # Copy engine files
        Write-Host "Copying from: $enginePath"
        Write-Host "Copying to: $ephemeralPath"
        
        Copy-Item -Path "$enginePath\flutter_windows.dll" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_windows.dll.lib" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_export.h" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_windows.h" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_messenger.h" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_plugin_registrar.h" -Destination $ephemeralPath -Force
        Copy-Item -Path "$enginePath\flutter_texture_registrar.h" -Destination $ephemeralPath -Force
        
        Write-Host "✓ Flutter engine files copied"
    
    - name: CMake Configure
      if: steps.flutter-build.outcome == 'failure'
      shell: cmd
      run: |
        echo ========================================
        echo Setting up Visual Studio environment
        echo ========================================
        call "${{ steps.setup-env.outputs.VCVARS_PATH }}"
        
        echo.
        echo ========================================
        echo Cleaning CMake cache
        echo ========================================
        if exist "build\windows\x64\CMakeCache.txt" del /F /Q "build\windows\x64\CMakeCache.txt"
        if exist "build\windows\x64\CMakeFiles" rd /S /Q "build\windows\x64\CMakeFiles"
        
        echo.
        echo ========================================
        echo Reconfiguring with Ninja
        echo ========================================
        cmake -S windows -B build\windows\x64 ^
          -G Ninja ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DFLUTTER_TARGET_PLATFORM=windows-x64
        
        if %ERRORLEVEL% NEQ 0 (
          echo ERROR: CMake reconfiguration failed!
          exit /b 1
        )
        
        echo ✓ CMake configuration completed
    
    - name: Fix generated build files
      if: steps.flutter-build.outcome == 'failure'
      shell: pwsh
      run: |
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Fixing quoted warning flags in generated build files" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        $fixedCount = 0
        
        # Fix all build.ninja files (这是关键！)
        $ninjaFiles = Get-ChildItem -Path "build/windows/x64" -Filter "build.ninja" -Recurse -ErrorAction SilentlyContinue
        
        foreach ($file in $ninjaFiles) {
          $content = Get-Content $file.FullName -Raw -ErrorAction SilentlyContinue
          if ($content) {
            $originalContent = $content
            
            # Fix escaped quotes in build.ninja: /wd\"4100\" -> /wd4100
            $content = $content -replace '/wd\\"(\d+)\\"', '/wd$1'
            # Also fix non-escaped quotes: /wd"4100" -> /wd4100
            $content = $content -replace '/wd"(\d+)"', '/wd$1'
            
            if ($content -ne $originalContent) {
              Set-Content -Path $file.FullName -Value $content -NoNewline
              Write-Host "✓ Fixed: $($file.FullName)" -ForegroundColor Green
              $fixedCount++
            }
          }
        }
        
        # Also fix CMakeLists.txt in build directory
        $cmakeFiles = Get-ChildItem -Path "build/windows/x64" -Filter "CMakeLists.txt" -Recurse -ErrorAction SilentlyContinue
        
        foreach ($file in $cmakeFiles) {
          $content = Get-Content $file.FullName -Raw -ErrorAction SilentlyContinue
          if ($content) {
            $originalContent = $content
            
            $content = $content -replace '/wd\\"(\d+)\\"', '/wd$1'
            $content = $content -replace '/wd"(\d+)"', '/wd$1'
            
            if ($content -ne $originalContent) {
              Set-Content -Path $file.FullName -Value $content -NoNewline
              Write-Host "✓ Fixed: $($file.FullName)" -ForegroundColor Green
              $fixedCount++
            }
          }
        }
        
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Fixed $fixedCount file(s)" -ForegroundColor Green
        Write-Host "========================================" -ForegroundColor Cyan
    
    - name: Build with Ninja
      if: steps.flutter-build.outcome == 'failure'
      shell: cmd
      run: |
        echo ========================================
        echo Setting up Visual Studio environment
        echo ========================================
        call "${{ steps.setup-env.outputs.VCVARS_PATH }}"
        
        echo.
        echo ========================================
        echo Building with Ninja
        echo ========================================
        cmake --build build\windows\x64 --config Release
        
        if %ERRORLEVEL% NEQ 0 (
          echo ERROR: Build failed!
          exit /b 1
        )
        
        echo.
        echo ✓ Build completed successfully!
    
    - name: Get version from pubspec
      id: version
      shell: pwsh
      run: |
        $version = (Get-Content pubspec.yaml | Select-String -Pattern 'version:\s*(.+)').Matches.Groups[1].Value
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Inspect build output
      shell: pwsh
      run: |
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Build Directory Structure" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        if (Test-Path "build/windows") {
          Write-Host "`nDirectory tree:" -ForegroundColor Yellow
          Get-ChildItem -Path "build/windows" -Recurse | ForEach-Object {
            $indent = "  " * ($_.FullName.Split('\').Count - "build/windows".Split('\').Count - 1)
            if ($_.PSIsContainer) {
              Write-Host "$indent[DIR]  $($_.Name)" -ForegroundColor Cyan
            } else {
              $size = if ($_.Length -gt 1MB) { "$([math]::Round($_.Length/1MB, 2)) MB" } else { "$([math]::Round($_.Length/1KB, 2)) KB" }
              Write-Host "$indent[FILE] $($_.Name) ($size)" -ForegroundColor Gray
            }
          }
          
          Write-Host "`nExecutable files:" -ForegroundColor Yellow
          Get-ChildItem -Path "build/windows" -Recurse -File -Filter "*.exe" | ForEach-Object {
            Write-Host "  ✓ $($_.FullName)" -ForegroundColor Green
          }
          
          Write-Host "`nDLL files:" -ForegroundColor Yellow
          Get-ChildItem -Path "build/windows" -Recurse -File -Filter "*.dll" | ForEach-Object {
            Write-Host "  ✓ $($_.FullName)" -ForegroundColor Green
          }
        } else {
          Write-Host "ERROR: build/windows directory not found!" -ForegroundColor Red
        }
    
    - name: Package application
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
        $zipName = "jn_production_line_windows_v${version}_${timestamp}.zip"
        
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Locating build output..." -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        # 查找实际的构建输出目录
        $possiblePaths = @(
          "build/windows/x64/runner/Release",
          "build/windows/x64/runner",
          "build/windows/runner/Release",
          "build/windows/runner"
        )
        
        $buildPath = $null
        foreach ($path in $possiblePaths) {
          if (Test-Path $path) {
            $exePath = Join-Path $path "jn_production_line.exe"
            if (Test-Path $exePath) {
              $buildPath = $path
              Write-Host "✓ Found build output at: $buildPath" -ForegroundColor Green
              break
            }
          }
        }
        
        if (-not $buildPath) {
          Write-Host "ERROR: Could not find build output!" -ForegroundColor Red
          Write-Host "Searched paths:" -ForegroundColor Yellow
          foreach ($path in $possiblePaths) {
            Write-Host "  - $path" -ForegroundColor Yellow
          }
          Write-Host "`nBuild directory structure:" -ForegroundColor Yellow
          if (Test-Path "build/windows") {
            Get-ChildItem -Path "build/windows" -Recurse -File -Filter "*.exe" | ForEach-Object {
              Write-Host "  Found EXE: $($_.FullName)" -ForegroundColor Yellow
            }
          }
          exit 1
        }
        
        # 创建打包目录
        New-Item -ItemType Directory -Force -Path package | Out-Null
        
        # 复制必要文件 - 使用正确的方式复制整个目录内容
        Write-Host "`nCopying files from: $buildPath" -ForegroundColor Cyan
        
        # 方法1: 直接复制目录内容（推荐）
        Get-ChildItem -Path $buildPath | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination "package/" -Recurse -Force
          Write-Host "  Copied: $($_.Name)" -ForegroundColor Gray
        }
        
        # 复制文档文件
        Copy-Item -Path "README*.md" -Destination "package/" -ErrorAction SilentlyContinue
        Copy-Item -Path "GPIB*.md" -Destination "package/" -ErrorAction SilentlyContinue
        Copy-Item -Path "install_gpib_dependencies.bat" -Destination "package/" -ErrorAction SilentlyContinue
        
        # 验证打包内容
        Write-Host "`n========================================" -ForegroundColor Cyan
        Write-Host "Verifying package contents..." -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        
        # 检查关键文件
        $requiredFiles = @(
          "jn_production_line.exe",
          "flutter_windows.dll"
        )
        
        $requiredDirs = @(
          "data"
        )
        
        $missingItems = @()
        
        foreach ($file in $requiredFiles) {
          $filePath = Join-Path "package" $file
          if (Test-Path $filePath) {
            $size = (Get-Item $filePath).Length / 1MB
            Write-Host "  ✓ $file ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
          } else {
            Write-Host "  ✗ $file (MISSING!)" -ForegroundColor Red
            $missingItems += $file
          }
        }
        
        foreach ($dir in $requiredDirs) {
          $dirPath = Join-Path "package" $dir
          if (Test-Path $dirPath) {
            $itemCount = (Get-ChildItem -Path $dirPath -Recurse -File).Count
            Write-Host "  ✓ $dir/ ($itemCount files)" -ForegroundColor Green
          } else {
            Write-Host "  ✗ $dir/ (MISSING!)" -ForegroundColor Red
            $missingItems += "$dir/"
          }
        }
        
        if ($missingItems.Count -gt 0) {
          Write-Host "`nERROR: Missing required files/directories!" -ForegroundColor Red
          Write-Host "Missing items:" -ForegroundColor Yellow
          $missingItems | ForEach-Object { Write-Host "  - $_" -ForegroundColor Yellow }
          
          Write-Host "`nActual package contents:" -ForegroundColor Yellow
          Get-ChildItem -Path "package" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)" -ForegroundColor Gray
          }
          exit 1
        }
        
        # 显示完整打包内容
        Write-Host "`nComplete package structure:" -ForegroundColor Cyan
        Get-ChildItem -Path "package" -Recurse | ForEach-Object {
          $indent = "  " * ($_.FullName.Split('\').Count - "package".Split('\').Count)
          if ($_.PSIsContainer) {
            Write-Host "$indent[DIR]  $($_.Name)" -ForegroundColor Cyan
          } else {
            $size = if ($_.Length -gt 1MB) { "$([math]::Round($_.Length/1MB, 2)) MB" } else { "$([math]::Round($_.Length/1KB, 2)) KB" }
            Write-Host "$indent[FILE] $($_.Name) ($size)" -ForegroundColor Gray
          }
        }
        
        # 计算总大小
        $totalSize = (Get-ChildItem -Path "package" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "`nTotal package size: $([math]::Round($totalSize, 2)) MB" -ForegroundColor Green
        
        # 创建 ZIP
        Write-Host "`n========================================" -ForegroundColor Cyan
        Write-Host "Creating archive: $zipName" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Compress-Archive -Path "package/*" -DestinationPath $zipName -Force
        
        $zipSize = (Get-Item $zipName).Length / 1MB
        Write-Host "✓ Archive created: $zipName ($([math]::Round($zipSize, 2)) MB)" -ForegroundColor Green
        
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: jn_production_line_windows_*.zip
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: jn_production_line_windows_*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
