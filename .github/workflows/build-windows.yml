name: Build Windows Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    # ⚡ 核心修复：指定使用 windows-2019 环境，以匹配你的旧版 CMakeLists 要求
    runs-on: windows-2019
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.4'
        channel: 'stable'
        cache: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 已移除 cache 选项，避免检测 requirements.txt 报错

    - name: Install Python dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install pyvisa pyvisa-py pandas openpyxl

    - name: Flutter doctor
      shell: pwsh
      run: flutter doctor -v

    - name: Get Flutter dependencies
      shell: pwsh
      run: flutter pub get

    - name: Build Windows application
      shell: pwsh
      run: flutter build windows --release

    - name: Verify build output
      shell: pwsh
      run: |
        Write-Host "Build output contents:" -ForegroundColor Cyan

        $releasePaths = @(
          "build\windows\x64\runner\Release",
          "build\windows\runner\Release"
        )

        $releaseDir = $null
        foreach ($path in $releasePaths) {
          if (Test-Path $path) {
            $releaseDir = $path
            break
          }
        }

        if (-not $releaseDir) {
          Write-Host "ERROR: No release directory found!" -ForegroundColor Red
          Write-Host "Contents of build\windows:" -ForegroundColor Yellow
          if (Test-Path "build\windows") {
            Get-ChildItem -Path "build\windows" -Recurse -Depth 4 | Select-Object FullName
          }
          exit 1
        }

        Write-Host "Release directory: $releaseDir" -ForegroundColor Green
        Get-ChildItem -Path $releaseDir | Select-Object Name, Length

        # 动态查找产物中的 .exe 文件，避免因改名导致 CI 报错
        $exeFile = Get-ChildItem -Path $releaseDir -Filter "*.exe" | Select-Object -First 1
        if (-not $exeFile) {
          Write-Host "✗ MISSING: No executable (.exe) found in release directory!" -ForegroundColor Red
          exit 1
        }

        $exe = $exeFile.FullName
        $dll = Join-Path $releaseDir "flutter_windows.dll"
        $icu = Join-Path $releaseDir "data\icudtl.dat"

        $allOk = $true
        foreach ($file in @($exe, $dll, $icu)) {
          if (Test-Path $file) {
            $size = (Get-Item $file).Length / 1MB
            Write-Host "✓ $file ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
          } else {
            Write-Host "✗ MISSING: $file" -ForegroundColor Red
            $allOk = $false
          }
        }

        if (-not $allOk) { exit 1 }

        # 将检测到的实际路径写入环境变量
        echo "RELEASE_DIR=$releaseDir" >> $env:GITHUB_ENV

    - name: Package release
      shell: pwsh
      run: |
        $releaseDir = $env:RELEASE_DIR
        Write-Host "Packaging from: $releaseDir" -ForegroundColor Cyan

        New-Item -ItemType Directory -Force -Path "release-package" | Out-Null
        Copy-Item -Path "$releaseDir\*" -Destination "release-package\" -Recurse -Force

        Write-Host "Package contents:" -ForegroundColor Cyan
        Get-ChildItem -Path "release-package" | Select-Object Name
        Write-Host "✓ Package ready" -ForegroundColor Green

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-${{ github.sha }}
        path: release-package/
        retention-days: 30
        if-no-files-found: error

    - name: Create release archive
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        # 压缩包命名自动跟随实际生成的 exe 名字
        $exeName = (Get-ChildItem -Path "release-package" -Filter "*.exe" | Select-Object -First 1).BaseName
        $zipName = "${exeName}-windows-${tag}.zip"
        
        Compress-Archive -Path "release-package\*" -DestinationPath $zipName -Force
        $size = (Get-Item $zipName).Length / 1MB
        Write-Host "✓ Created $zipName ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
        echo "RELEASE_ZIP=$zipName" >> $env:GITHUB_ENV

    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.RELEASE_ZIP }}
        draft: false
        prerelease: false