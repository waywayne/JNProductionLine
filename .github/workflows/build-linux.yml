name: Build Linux Application

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          # - arch: arm64
          #   runner: ubuntu-24.04-arm
    
    runs-on: ${{ matrix.runner }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          liblzma-dev \
          libstdc++-12-dev \
          bluez \
          bluez-tools \
          libbluetooth-dev \
          socat \
          rfkill
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
        
    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Enable Linux desktop
      run: flutter config --enable-linux-desktop
      
    - name: Remove problematic plugin from pubspec
      run: |
        echo "🔧 Removing flutter_bluetooth_classic_serial from pubspec.yaml (Windows-only)"
        sed -i '/flutter_bluetooth_classic_serial/d' pubspec.yaml
        
        echo "🔧 Updating import to use stub implementation"
        sed -i "s|package:flutter_bluetooth_classic_serial/flutter_bluetooth_classic.dart|flutter_bluetooth_classic_stub.dart|g" lib/services/spp_service.dart
        
        echo "✅ Configuration updated for Linux build"
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      continue-on-error: true
      
    - name: Verify native libraries
      run: |
        echo "🔍 检查 libimage_test.so 是否在代码仓库中..."
        if [ -f "lib/image_detect/libimage_test.so" ]; then
          echo "✅ 找到 libimage_test.so"
          ls -lh lib/image_detect/libimage_test.so
          file lib/image_detect/libimage_test.so
        else
          echo "⚠️  libimage_test.so 未找到，图片检测功能将不可用"
          echo "   请确保 .gitignore 中有 !lib/image_detect/*.so 例外规则"
        fi

    - name: Build Linux application
      run: |
        echo "🔨 Building for architecture: ${{ matrix.arch }}"
        flutter build linux --release
        
        # 验证构建产物
        echo "📦 Build output:"
        ls -la build/linux/
        
        # 验证 libimage_test.so 是否被打包
        echo ""
        echo "🔍 检查 bundle 中的 libimage_test.so..."
        BUNDLE_LIB="build/linux/${{ matrix.arch }}/release/bundle/lib"
        if [ -f "$BUNDLE_LIB/libimage_test.so" ]; then
          echo "✅ libimage_test.so 已打包到 bundle/lib/"
          ls -lh "$BUNDLE_LIB/libimage_test.so"
        else
          echo "⚠️  libimage_test.so 未在 bundle 中找到"
          echo "   bundle/lib 内容:"
          ls -la "$BUNDLE_LIB/" 2>/dev/null || echo "   (目录不存在)"
        fi
        
    - name: Package application
      run: |
        # 确定实际的构建目录
        if [ -d "build/linux/${{ matrix.arch }}/release/bundle" ]; then
          BUILD_DIR="build/linux/${{ matrix.arch }}/release/bundle"
        elif [ -d "build/linux/arm64/release/bundle" ]; then
          BUILD_DIR="build/linux/arm64/release/bundle"
        elif [ -d "build/linux/x64/release/bundle" ]; then
          BUILD_DIR="build/linux/x64/release/bundle"
        else
          echo "❌ Cannot find build directory"
          ls -la build/linux/
          exit 1
        fi
        
        echo "📦 Packaging from: $BUILD_DIR"
        
        # 复制 scripts 目录到构建产物中
        echo "📋 复制 scripts 目录..."
        cp -r scripts "$BUILD_DIR/"
        
        # 设置脚本执行权限
        chmod +x "$BUILD_DIR/scripts/"*.py
        chmod +x "$BUILD_DIR/scripts/"*.sh
        
        echo "✅ Scripts 目录已复制"
        ls -la "$BUILD_DIR/scripts/"
        
        # 打包
        cd "$BUILD_DIR"
        tar -czf ../../../../../jn-production-line-linux-${{ matrix.arch }}.tar.gz .
        cd ../../../../../
        
    - name: Prepare artifacts
      run: |
        # 创建 artifacts 目录
        mkdir -p artifacts
        
        # 复制文件到 artifacts 目录
        cp jn-production-line-linux-${{ matrix.arch }}.tar.gz artifacts/
        cp scripts/install-linux.sh artifacts/
        cp scripts/README-ARTIFACT.md artifacts/README.md
        
        # 验证文件
        echo "📦 Artifact contents:"
        ls -lh artifacts/
        echo ""
        echo "Files to be uploaded:"
        find artifacts -type f
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build-${{ matrix.arch }}
        path: artifacts/*
        retention-days: 30
        
    - name: Display build info
      run: |
        echo "✅ Build completed successfully for ${{ matrix.arch }}!"
        echo ""
        echo "📊 Build size:"
        du -sh build/linux/${{ matrix.arch }}/release/bundle
        echo ""
        echo "📦 Archive size:"
        ls -lh jn-production-line-linux-${{ matrix.arch }}.tar.gz
        echo ""
        echo "📋 Artifacts:"
        ls -lh artifacts/
