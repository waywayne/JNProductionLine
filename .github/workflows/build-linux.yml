name: Build Linux Application

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    
    runs-on: ${{ matrix.runner }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          liblzma-dev \
          libstdc++-12-dev \
          bluez \
          bluez-tools \
          libbluetooth-dev \
          socat \
          rfkill
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'
        cache: true
        
    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Enable Linux desktop
      run: flutter config --enable-linux-desktop
      
    - name: Remove problematic plugin from pubspec
      run: |
        echo "🔧 Removing flutter_bluetooth_classic_serial from pubspec.yaml (Windows-only)"
        sed -i '/flutter_bluetooth_classic_serial/d' pubspec.yaml
        
        echo "🔧 Updating import to use stub implementation"
        sed -i "s|package:flutter_bluetooth_classic_serial/flutter_bluetooth_classic.dart|flutter_bluetooth_classic_stub.dart|g" lib/services/spp_service.dart
        
        echo "✅ Configuration updated for Linux build"
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      continue-on-error: true
      
    - name: Build Linux application
      run: flutter build linux --release
        
    - name: Package application
      run: |
        cd build/linux/${{ matrix.arch }}/release/bundle
        tar -czf ../../../../../jn-production-line-linux-${{ matrix.arch }}.tar.gz .
        cd ../../../../../
        
    - name: Prepare artifacts
      run: |
        # 创建 artifacts 目录
        mkdir -p artifacts
        
        # 复制文件到 artifacts 目录
        cp jn-production-line-linux-${{ matrix.arch }}.tar.gz artifacts/
        cp scripts/install-linux.sh artifacts/
        cp scripts/README-ARTIFACT.md artifacts/README.md
        
        # 验证文件
        echo "📦 Artifact contents:"
        ls -lh artifacts/
        echo ""
        echo "Files to be uploaded:"
        find artifacts -type f
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build-${{ matrix.arch }}
        path: artifacts/*
        retention-days: 30
        
    - name: Display build info
      run: |
        echo "✅ Build completed successfully for ${{ matrix.arch }}!"
        echo ""
        echo "📊 Build size:"
        du -sh build/linux/${{ matrix.arch }}/release/bundle
        echo ""
        echo "📦 Archive size:"
        ls -lh jn-production-line-linux-${{ matrix.arch }}.tar.gz
        echo ""
        echo "📋 Artifacts:"
        ls -lh artifacts/
