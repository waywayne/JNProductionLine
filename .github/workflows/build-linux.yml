name: Build Linux Application

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          ninja-build \
          pkg-config \
          libgtk-3-dev \
          liblzma-dev \
          libstdc++-12-dev \
          bluez \
          bluez-tools \
          libbluetooth-dev \
          socat \
          rfkill
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
        
    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Enable Linux desktop
      run: flutter config --enable-linux-desktop
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Fix Linux plugin configuration
      run: |
        chmod +x scripts/fix-linux-plugins.sh
        ./scripts/fix-linux-plugins.sh
      
    - name: Analyze code
      run: flutter analyze
      continue-on-error: true
      
    - name: Build Linux application
      run: flutter build linux --release
        
    - name: Package application
      run: |
        cd build/linux/x64/release/bundle
        tar -czf ../../../../../jn-production-line-linux-x64.tar.gz .
        cd ../../../../../
        
    - name: Create AppImage (optional)
      continue-on-error: true
      run: |
        # Install AppImage tools
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        # Create AppDir structure
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        # Copy application files
        cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
        
        # Create desktop entry
        cat > AppDir/usr/share/applications/jn-production-line.desktop << EOF
        [Desktop Entry]
        Name=JN Production Line
        Exec=jn_production_line
        Icon=jn-production-line
        Type=Application
        Categories=Utility;Development;
        EOF
        
        # Create AppImage
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: |
          jn-production-line-linux-x64.tar.gz
          *.AppImage
        retention-days: 30
        
    - name: Display build info
      run: |
        echo "Build completed successfully!"
        echo "Build size:"
        du -sh build/linux/x64/release/bundle
        echo "Archive size:"
        ls -lh jn-production-line-linux-x64.tar.gz
